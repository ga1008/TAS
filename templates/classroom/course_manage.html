{% extends "base.html" %}
{% block title %}课程管理 - 课堂辅助{% endblock %}

{% block content %}
<div class="max-w-6xl mx-auto space-y-6">
    <div class="flex space-x-1 border-b border-slate-200">
        <button onclick="switchTab('manage')" id="tab-manage" class="px-6 py-3 text-sm font-medium text-brand-600 border-b-2 border-brand-600 transition-colors">
            <i class="fas fa-book mr-2"></i>课程管理
        </button>
        <button onclick="switchTab('open')" id="tab-open" class="px-6 py-3 text-sm font-medium text-slate-500 hover:text-slate-700 transition-colors">
            <i class="fas fa-chalkboard-teacher mr-2"></i>开设课堂
        </button>
        <button onclick="switchTab('ai')" id="tab-ai" class="px-6 py-3 text-sm font-medium text-slate-500 hover:text-slate-700 transition-colors">
            <i class="fas fa-robot mr-2"></i>课堂AI配置
        </button>
    </div>

    <div id="pane-manage" class="block bg-white p-6 rounded-xl shadow-sm border border-slate-100">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
            <!-- Left: classes list -->
            <div class="md:col-span-1 bg-white rounded-xl border border-slate-100 p-4 shadow-sm">
                <div class="flex items-center justify-between mb-3">
                    <h3 class="text-sm font-bold">我的课程</h3>
                    <button id="newCourseBtn" class="text-xs text-slate-500">新建</button>
                </div>
                <div id="classList" class="space-y-2 max-h-[60vh] overflow-y-auto">
                    <!-- class items injected here -->
                </div>
            </div>

            <!-- Right: course form occupies 3 cols -->
            <div class="md:col-span-3 bg-white/50 p-4 rounded-md border border-slate-50">
                <h2 class="text-xl font-bold mb-4">1. 基础课程配置</h2>
                <p class="text-slate-500 mb-4">建立您的教学课程库。此步骤独立于学生数据。</p>

                <form id="courseForm" class="space-y-4">
                    <input type="hidden" id="class_id" value="" />
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label for="semester" class="text-sm font-medium text-slate-600">开课学期</label>
                            <input type="text" id="semester" name="semester" class="mt-1 block w-full rounded-xl border border-slate-200 px-3 py-2" readonly />
                        </div>

                        <div>
                            <label for="name" class="text-sm font-medium text-slate-600">课程名称</label>
                            <input type="text" id="name" name="name" class="mt-1 block w-full rounded-xl border border-slate-200 px-3 py-2" required />
                        </div>

                        <div>
                            <label for="hours" class="text-sm font-medium text-slate-600">学时 (小时)</label>
                            <input type="number" id="hours" name="hours" min="1" value="16" class="mt-1 block w-full rounded-xl border border-slate-200 px-3 py-2" required />
                        </div>

                        <div>
                            <label for="credits" class="text-sm font-medium text-slate-600">学分</label>
                            <input type="text" id="credits" name="credits" class="mt-1 block w-full rounded-xl border border-slate-200 px-3 py-2" required />
                        </div>
                    </div>

                    <div>
                        <label for="description" class="text-sm font-medium text-slate-600">课程简介</label>
                        <textarea id="description" name="description" rows="3" class="mt-1 block w-full rounded-xl border border-slate-200 px-3 py-2"></textarea>
                    </div>

                    <div>
                        <label for="textbooks" class="text-sm font-medium text-slate-600">使用教材 (可多选)</label>
                                <div class="mt-2 flex gap-2 items-start">
                                            <div class="flex-1">
                                                <select id="textbooks" name="textbooks" multiple class="w-full rounded-xl border border-slate-200 p-2 h-28"></select>
                                                <!-- Preview list shows same items as select but with hover/click preview -->
                                                <div id="textbookPreviewList" class="mt-2 grid grid-cols-2 gap-2 text-sm"></div>
                                            </div>
                                            <div class="flex-shrink-0">
                                                <button type="button" id="addTextbookBtn" class="ml-2 px-3 py-2 bg-brand-600 text-white rounded-xl">新增教材</button>
                                            </div>
                                        </div>
                    </div>

                    <!-- 教材目录已迁移至资源管理 -> 教材库（在新增/编辑教材时维护） -->

                    <div class="flex justify-end">
                        <button type="button" id="saveCourse" class="px-6 py-2 bg-emerald-600 text-white rounded-xl">保存课程</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Textbook management moved to Library (resource management). Add button navigates to library pages. -->

        <script>
            let currentClassId = null; // null => create new
            function renderClassList(items) {
                const root = document.getElementById('classList');
                root.innerHTML = '';
                if (!items || items.length === 0) {
                    root.innerHTML = '<div class="text-sm text-slate-400">暂无课程</div>';
                    return;
                }
                items.forEach(c => {
                    const el = document.createElement('div');
                    el.className = 'p-3 rounded-md border border-slate-100 hover:bg-slate-50 flex justify-between items-center';
                    el.innerHTML = `
                        <div>
                            <div class="text-sm font-medium text-slate-800">${c.name}</div>
                            <div class="text-[11px] text-slate-500 mt-0.5">${c.course} · ${c.semester || ''}</div>
                        </div>
                        <div class="flex gap-2">
                            <button class="editBtn text-xs px-3 py-1 bg-slate-100 rounded-md" data-id="${c.id}">编辑</button>
                        </div>`;
                    root.appendChild(el);
                });

                // bind edit buttons
                document.querySelectorAll('.editBtn').forEach(b => b.addEventListener('click', (ev) => {
                    const id = ev.currentTarget.getAttribute('data-id');
                    loadClassIntoForm(parseInt(id));
                }));
            }

            function fetchClasses() {
                fetch('/classroom/api/list_classes').then(r=>r.json()).then(j=>{
                    if (j.status === 'success') renderClassList(j.data);
                })
            }

            function loadClassIntoForm(id) {
                fetch(`/classroom/api/get_class/${id}`).then(r=>r.json()).then(j=>{
                    if (j.status === 'success') {
                        const c = j.data;
                        currentClassId = c.id;
                        document.getElementById('class_id').value = c.id;
                        document.getElementById('semester').value = c.semester || '';
                        document.getElementById('name').value = c.name || '';
                        document.getElementById('hours').value = c.hours || 16;
                        document.getElementById('credits').value = (c.credits!=null? c.credits: calcCredits(c.hours||16));
                        document.getElementById('description').value = c.description || '';
                        // select textbooks
                        const sel = document.getElementById('textbooks');
                        // clear selection
                        Array.from(sel.options).forEach(opt=>opt.selected=false);
                        if (c.textbooks && c.textbooks.length>0) {
                            c.textbooks.forEach(t=>{ const o = sel.querySelector(`option[value="${t.id}"]`); if (o) o.selected = true; });
                        }
                        // update preview highlights if available
                        if (typeof updateSelectedHighlights === 'function') updateSelectedHighlights();
                        // focus on form
                        document.getElementById('name').focus();
                    }
                })
            }

            // reuse existing JS for semester/credits and textbooks creation
            function genSemester() {
                const d = new Date();
                const y = d.getFullYear();
                const m = d.getMonth() + 1;
                let startYear, nextYear, term;
                if (m >= 8) {
                    startYear = y; nextYear = y+1; term = 1;
                } else {
                    startYear = y-1; nextYear = y; term = (m >=2 && m<=7) ? 2 : 2;
                }
                return `${startYear}-${nextYear}-${term}`;
            }

            function calcCredits(hours) { return (Math.round((hours/16)*10)/10).toFixed(1); }

            document.addEventListener('DOMContentLoaded', () => {
                // initial
                document.getElementById('semester').value = genSemester();
                const hoursEl = document.getElementById('hours');
                const creditsEl = document.getElementById('credits');
                creditsEl.value = calcCredits(parseInt(hoursEl.value || 16));
                hoursEl.addEventListener('input', ()=>{ const h=Math.max(1,parseInt(hoursEl.value||1)); creditsEl.value = calcCredits(h); });

                // Textbook search + load via library API
                const tbSearch = document.createElement('input');
                tbSearch.id = 'textbook_search';
                tbSearch.placeholder = '搜索教材（按书名或作者）';
                tbSearch.className = 'w-full rounded-md border p-2 mb-2';
                const tbContainer = document.getElementById('textbooks').parentNode;
                tbContainer.insertBefore(tbSearch, tbContainer.firstChild);

                function loadTextbooks(q=''){
                    fetch('/library/api/textbooks?q=' + encodeURIComponent(q)).then(r=>r.json()).then(js=>{
                        if (js.status==='success'){
                            const sel=document.getElementById('textbooks'); sel.innerHTML='';
                            js.data.forEach(t=>{ const opt=document.createElement('option'); opt.value=t.id; opt.textContent = `${t.title}${t.author? ' - '+t.author: ''}`; sel.appendChild(opt); });
                            // populate preview list alongside select
                            if (typeof renderPreviewList === 'function') renderPreviewList(js.data);
                        }
                    })
                }

                tbSearch.addEventListener('input', ()=>{ loadTextbooks(tbSearch.value); });
                loadTextbooks();

                // when user toggles selection in the select element directly, update preview highlights
                document.getElementById('textbooks').addEventListener('change', ()=>{ if (typeof updateSelectedHighlights === 'function') updateSelectedHighlights(); });

                // Quick preview tooltip and modal elements
                const tooltip = document.createElement('div');
                tooltip.id = 'tbTooltip';
                tooltip.className = 'hidden fixed z-50 p-3 bg-white rounded-xl shadow-md border border-slate-100 text-sm w-72';
                document.body.appendChild(tooltip);

                const modalMarkup = `
<div id="tbPreviewModal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center">
  <div class="bg-white rounded-xl p-6 w-full max-w-lg">
    <div class="flex justify-between items-start">
      <h3 id="pm_title" class="text-xl font-bold">教材详情</h3>
      <button id="pm_close" class="text-slate-500">✕</button>
    </div>
    <div class="mt-3 space-y-2 text-sm text-slate-700">
      <div><strong>作者:</strong> <span id="pm_author"></span></div>
      <div><strong>出版社:</strong> <span id="pm_publisher"></span></div>
      <div><strong>ISBN:</strong> <span id="pm_isbn"></span></div>
      <div><strong>简介:</strong><div id="pm_summary" class="mt-1 text-slate-600"></div></div>
    </div>
    <div class="flex justify-end mt-4">
      <button id="pm_toggle_select" class="px-4 py-2 rounded-xl border mr-2">切换选中</button>
      <button id="pm_close2" class="px-4 py-2 rounded-xl bg-brand-600 text-white">关闭</button>
    </div>
  </div>
</div>`;
                document.body.insertAdjacentHTML('beforeend', modalMarkup);

                // helper: render preview list and bind interactions
                function renderPreviewList(items){
                    const root = document.getElementById('textbookPreviewList');
                    root.innerHTML = '';
                    if(!items || items.length === 0) { root.innerHTML = '<div class="text-slate-400">暂无教材预览</div>'; return; }
                    items.forEach(t=>{
                        const el = document.createElement('div');
                        el.className = 'tb-item p-2 rounded-md border border-slate-100 hover:bg-slate-50 flex justify-between items-center';
                        el.innerHTML = `<div class="truncate mr-2"><span class="tb-title font-medium">${t.title}</span><div class="text-xs text-slate-500">${t.author? t.author : ''}</div></div><div class="flex items-center gap-2"><button class="tb-info text-xs px-2 py-1 rounded-md border" data-id="${t.id}">查看</button><button class="tb-toggle text-xs px-2 py-1 rounded-md" data-id="${t.id}">选中</button></div>`;
                        // store full data on element for tooltip
                        el.dataset.tb = JSON.stringify(t);
                        root.appendChild(el);
                    });
                    updateSelectedHighlights();
                }

                function updateSelectedHighlights(){
                    const sel = document.getElementById('textbooks');
                    const selected = Array.from(sel.selectedOptions).map(o=>o.value);
                    document.querySelectorAll('#textbookPreviewList .tb-item').forEach(it=>{
                        const tb = JSON.parse(it.dataset.tb || '{}');
                        if(selected.indexOf(String(tb.id)) !== -1) it.classList.add('bg-emerald-50','border-emerald-200'); else { it.classList.remove('bg-emerald-50','border-emerald-200'); }
                    });
                }

                // expose helpers so outer functions (e.g. loadClassIntoForm) can trigger updates
                window.updateSelectedHighlights = updateSelectedHighlights;
                window.renderPreviewList = renderPreviewList;

                // global listeners for preview interactions
                document.getElementById('textbookPreviewList').addEventListener('click', (ev)=>{
                    const btn = ev.target.closest('button');
                    if(!btn) return;
                    const id = btn.dataset.id;
                    const sel = document.getElementById('textbooks');
                    if(btn.classList.contains('tb-toggle')){
                        // toggle selection in the select element
                        const opt = sel.querySelector(`option[value="${id}"]`);
                        if(opt) { opt.selected = !opt.selected; updateSelectedHighlights(); }
                    } else if(btn.classList.contains('tb-info')){
                        // open modal
                        const dataEl = btn.closest('.tb-item');
                        const tb = JSON.parse(dataEl.dataset.tb || '{}');
                        document.getElementById('pm_title').textContent = tb.title || '教材详情';
                        document.getElementById('pm_author').textContent = tb.author || '—';
                        document.getElementById('pm_publisher').textContent = tb.publisher || '—';
                        document.getElementById('pm_isbn').textContent = tb.isbn || '—';
                        document.getElementById('pm_summary').textContent = tb.summary || tb.description || '无';
                        document.getElementById('tbPreviewModal').classList.remove('hidden');
                        // attach toggle button dataset
                        document.getElementById('pm_toggle_select').dataset.id = id;
                    }
                });

                // tooltip behavior on hover
                document.getElementById('textbookPreviewList').addEventListener('mouseover', (ev)=>{
                    const item = ev.target.closest('.tb-item');
                    if(!item) return;
                    const tb = JSON.parse(item.dataset.tb || '{}');
                    tooltip.innerHTML = `<div class="font-medium">${tb.title || ''}</div><div class="text-xs text-slate-500 mt-1">${tb.author || ''}${tb.publisher? ' · '+tb.publisher : ''}</div><div class="text-xs text-slate-400 mt-2">ISBN: ${tb.isbn||'—'}</div>`;
                    tooltip.classList.remove('hidden');
                    // position near mouse
                    const rect = item.getBoundingClientRect();
                    const top = rect.top + window.scrollY - 10;
                    const left = rect.right + 8 + window.scrollX;
                    tooltip.style.top = `${top}px`;
                    tooltip.style.left = `${left}px`;
                });
                document.getElementById('textbookPreviewList').addEventListener('mouseleave', (ev)=>{
                    // hide tooltip when leaving container
                    tooltip.classList.add('hidden');
                });

                // modal close buttons
                document.getElementById('pm_close').addEventListener('click', ()=>{ document.getElementById('tbPreviewModal').classList.add('hidden'); });
                document.getElementById('pm_close2').addEventListener('click', ()=>{ document.getElementById('tbPreviewModal').classList.add('hidden'); });
                document.getElementById('pm_toggle_select').addEventListener('click', (ev)=>{
                    const id = ev.currentTarget.dataset.id; const sel = document.getElementById('textbooks'); const opt = sel.querySelector(`option[value="${id}"]`);
                    if(opt){ opt.selected = !opt.selected; updateSelectedHighlights(); }
                });

                // Navigate to library textbook creation page
                document.getElementById('addTextbookBtn').addEventListener('click', ()=>{ window.location.href = '/library/textbooks/new'; });

                document.getElementById('newCourseBtn').addEventListener('click', ()=>{ currentClassId=null; document.getElementById('class_id').value=''; document.getElementById('semester').value=genSemester(); document.getElementById('name').value=''; document.getElementById('hours').value=16; document.getElementById('credits').value=calcCredits(16); document.getElementById('description').value=''; Array.from(document.getElementById('textbooks').options).forEach(o=>o.selected=false); });

                document.getElementById('saveCourse').addEventListener('click', ()=>{
                    const payload = { semester: document.getElementById('semester').value, name: document.getElementById('name').value, hours: parseInt(document.getElementById('hours').value||1), credits: parseFloat(document.getElementById('credits').value||0), description: document.getElementById('description').value, textbook_ids: Array.from(document.getElementById('textbooks').selectedOptions).map(o=>parseInt(o.value)) };
                    if (currentClassId) {
                        fetch(`/classroom/api/update_course/${currentClassId}`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload)}).then(r=>r.json()).then(j=>{ if (j.status==='success'){ alert('更新成功'); fetchClasses(); } else alert('更新失败:'+ (j.msg||'')); });
                    } else {
                        fetch('/classroom/api/create_course',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}).then(r=>r.json()).then(j=>{ if (j.status==='success'){ alert('创建成功'); fetchClasses(); } else alert('创建失败:'+ (j.msg||'')); });
                    }
                });

                // load initial class list
                fetchClasses();
            });
        </script>
    </div>

    <div id="pane-open" class="hidden bg-white p-6 rounded-xl shadow-sm border border-slate-100">
        <h2 class="text-xl font-bold mb-4">2. 为班级开设课堂</h2>
        <p class="text-slate-500 mb-4">选择前置导入的班级名单，将其实体化为一个互动课堂。</p>
        <label for="open_class_select" class="sr-only">选择班级</label>
        <select id="open_class_select" class="form-select border rounded p-2 w-full max-w-md">
            <option value="">请选择前置导入的班级...</option>
            {% for cls in classes %}
                <option value="{{ cls.id }}">{{ cls.name }}</option>
            {% endfor %}
        </select>
    </div>

    <div id="pane-ai" class="hidden bg-white p-6 rounded-xl shadow-sm border border-slate-100">
        <h2 class="text-xl font-bold mb-4">3. 专属 AI 助手设定</h2>
        <p class="text-slate-500 mb-4">为当前已开设的课堂定义 Prompt 与能力边界。</p>
        </div>
</div>

<script>
function switchTab(target) {
    const tabs = ['manage', 'open', 'ai'];
    tabs.forEach(tab => {
        // 控制下划线及高亮样式
        const tabBtn = document.getElementById('tab-' + tab);
        const pane = document.getElementById('pane-' + tab);
        if (tab === target) {
            tabBtn.classList.replace('text-slate-500', 'text-brand-600');
            tabBtn.classList.add('border-b-2', 'border-brand-600');
            pane.classList.replace('hidden', 'block');
        } else {
            tabBtn.classList.replace('text-brand-600', 'text-slate-500');
            tabBtn.classList.remove('border-b-2', 'border-brand-600');
            pane.classList.replace('block', 'hidden');
        }
    });
}
</script>
{% endblock %}
