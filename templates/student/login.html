<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生端登录 - 课堂辅助系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8' }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen">

    <div class="w-full max-w-md p-8 bg-white rounded-2xl shadow-xl border border-slate-100 transform transition-all hover:scale-[1.01] duration-300">

        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-gradient-to-tr from-brand-500 to-indigo-600 rounded-2xl mx-auto flex items-center justify-center shadow-lg shadow-brand-200 mb-4 transform rotate-3">
                <i class="fas fa-graduation-cap text-3xl text-white -rotate-3"></i>
            </div>
            <h2 class="text-2xl font-extrabold text-slate-800">学生学习终端</h2>
            <p class="text-sm text-slate-500 mt-2">请输入您的学号与姓名以进入专属课堂</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="mb-6 p-4 rounded-xl flex items-start gap-3
                        {% if category == 'error' %}bg-rose-50 border border-rose-100 text-rose-600
                        {% elif category == 'success' %}bg-emerald-50 border border-emerald-100 text-emerald-600
                        {% else %}bg-amber-50 border border-amber-100 text-amber-600{% endif %}">
                        <i class="fas {% if category == 'error' %}fa-exclamation-circle{% elif category == 'success' %}fa-check-circle{% else %}fa-info-circle{% endif %} mt-0.5"></i>
                        <span class="text-sm font-medium">{{ message }}</span>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('student_portal.login') }}" class="space-y-5">
            <div>
                <label for="student_id" class="block text-sm font-bold text-slate-700 mb-1.5">学号</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-id-badge text-slate-400"></i>
                    </div>
                    <input type="text" id="student_id" name="student_id" required autocomplete="off"
                        class="block w-full pl-10 pr-3 py-3 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-brand-500 focus:border-brand-500 bg-slate-50 focus:bg-white transition-colors"
                        placeholder="请输入您的学号">
                </div>
            </div>

            <div>
                <label for="name" class="block text-sm font-bold text-slate-700 mb-1.5">真实姓名</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-user text-slate-400"></i>
                    </div>
                    <input type="text" id="name" name="name" required autocomplete="off"
                        class="block w-full pl-10 pr-3 py-3 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-brand-500 focus:border-brand-500 bg-slate-50 focus:bg-white transition-colors"
                        placeholder="请输入姓名">
                </div>
            </div>

            <div class="flex items-center justify-between text-xs text-slate-500 pt-2 pb-2">
                <span class="flex items-center gap-1.5"><i class="fas fa-shield-alt text-emerald-500"></i> 单设备安全登录保护中</span>
            </div>

            <button type="submit" class="w-full flex justify-center items-center gap-2 py-3.5 px-4 border border-transparent rounded-xl shadow-sm text-sm font-bold text-white bg-brand-600 hover:bg-brand-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500 transition-all hover:shadow-md">
                <span>安全进入课堂</span>
                <i class="fas fa-arrow-right text-xs"></i>
            </button>
        </form>

    </div>

    <div class="fixed bottom-6 text-center w-full text-xs font-medium text-slate-400">
        &copy; 2026 课堂辅助终端. All rights reserved.
    </div>

</body>
</html>
